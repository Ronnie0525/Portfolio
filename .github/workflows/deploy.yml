name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      VITE_SUPABASE_PROJECT_ID: eqfkzlqweiglzcxgfzrq
      VITE_SUPABASE_URL: https://eqfkzlqweiglzcxgfzrq.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZmt6bHF3ZWlnbHpjeGdmenJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDA3MTksImV4cCI6MjA5MTA3NjcxOX0.7gKKmS4uvT2h6UgQvnZHc5YP5G0bPssjI4BZeEEJ3lQ
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
